<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueceu a Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/estilo.css">
    <style>
        .recuperacao-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-weight: 400;
        }

        .recuperacao-form .form-control {
            width: 100%;
        }

        .status-error {
            color: #b30000;
            margin: 0;
        }

        .recuperacao-form button[type="submit"],
        .recuperacao-form .btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>MySongProfileApp</h1>
            <p>Insira seu e-mail para redefinir sua senha.</p>

            <form class="recuperacao-form" id="formulario">
                
                <div class="field-group">
                    <label for="email">E-mail:</label>
                    <input class="form-control" type="email" id="email" name="email" required>
                </div>
                <button type="submit">Trocar senha</button>
                <div id="message"></div>

            </form>
        </div>
    </div>

    <script type="module" src="./js/toast.js"></script>
    <script type="module" src="./js/esqueceuSenha.js"></script>

</body>
</html>
